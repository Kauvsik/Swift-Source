<template>
    <lightning-card title="New Project Request">
        <div class="slds-p-around_medium">
            <lightning-input 
                label="Project Name" 
                data-id="projectName"
                required>
            </lightning-input>
            
            <lightning-textarea 
                label="Project Description" 
                data-id="projectDescription"
                class="slds-m-top_medium">
            </lightning-textarea>
            
            <lightning-input 
                type="number" 
                label="Budget" 
                data-id="budget"
                formatter="currency"
                class="slds-m-top_medium">
            </lightning-input>
            
            <lightning-input 
                type="date" 
                label="Due Date" 
                data-id="dueDate"
                class="slds-m-top_medium">
            </lightning-input>
            
            <lightning-combobox
                label="Category"
                data-id="category"
                placeholder="Select a category"
                options={categoryOptions}
                class="slds-m-top_medium">
            </lightning-combobox>
            
            <div class="slds-m-top_large" style="display: flex; gap: 10px;">
                <lightning-button 
                    label="Submit Request" 
                    variant="brand"
                    onclick={handleSubmit}>
                </lightning-button>
                <lightning-button 
                    label="Back to Dashboard" 
                    onclick={handleBack}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
